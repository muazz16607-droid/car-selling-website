<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sell Your Car | Premium Cars TZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a class="brand" href="./index.html">Premium Cars TZ</a>
      <button class="menu-toggle" aria-label="Open menu">Menu</button>
      <div class="nav-links">
        <a href="./cars.html">Browse Cars</a>
        <a class="active" href="./sell.html">Sell Car</a>
        <a href="./auth.html#login">Login</a>
        <a class="btn btn-accent" href="./auth.html#register">Register</a>
        <a data-admin-link="true" href="./admin.html">Admin</a>
        <a href="./contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main class="container section">
    <div class="form-shell">
      <h1>List Your Car</h1>
      <p>Enter vehicle details to publish a listing instantly.</p>
      <form id="sell-form" class="form-grid">
        <input name="make" type="text" placeholder="Make (e.g. Toyota)" required />
        <input name="model" type="text" placeholder="Model (e.g. Corolla)" required />
        <input name="year" type="number" min="1990" max="2027" placeholder="Year" required />
        <input name="price" type="number" min="1000" step="500" placeholder="Price (USD)" required />
        <select name="fuel" required>
          <option value="">Fuel Type</option>
          <option value="Gasoline">Gasoline</option>
          <option value="Hybrid">Hybrid</option>
          <option value="Electric">Electric</option>
          <option value="Diesel">Diesel</option>
        </select>
        <input name="image_url" type="url" placeholder="Image URL" required />
        <textarea name="description" rows="5" placeholder="Short description" required></textarea>
        <button class="btn btn-dark" type="submit">Publish Listing</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-wrap">
      <p>(c) 2026 Premium Cars TZ. All rights reserved.</p>
    </div>
  </footer>

  <script src="./assets/app.js"></script>
</body>
</html>
