<section class="hero">
  <div class="hero-visual"></div>

  <div class="container hero-content">
    <p class="kicker">Verified Marketplace • Premium Listings</p>

    <h1>Find Your Next Car in Seconds</h1>

    <p>
      Search, compare, and save cars from trusted sellers.
      Built for speed and smart decisions.
    </p>

    <!-- 🔥 LEVEL 2 SEARCH BAR -->
    <div class="search-bar">
      <input id="search-input" type="text" placeholder="Search make or model..." />

      <select id="fuel-filter">
        <option value="all">All Fuel</option>
        <option value="Gasoline">Gasoline</option>
        <option value="Hybrid">Hybrid</option>
        <option value="Electric">Electric</option>
        <option value="Diesel">Diesel</option>
      </select>

      <select id="sort-filter">
        <option value="default">Sort</option>
        <option value="price-asc">Price ↑</option>
        <option value="price-desc">Price ↓</option>
        <option value="year-desc">Newest</option>
      </select>

      <button class="btn btn-accent" id="clear-filters">Reset</button>
    </div>

    <div class="hero-actions">
      <a class="btn btn-dark" href="./cars.html">Browse Inventory</a>
      <a class="btn btn-light" href="./sell.html">Sell Your Car</a>
    </div>
  </div>
</section>

<section class="container section">
  <div class="section-head">
    <h2>Featured Cars</h2>
    <div class="mini-actions">
      <button id="view-favorites" class="btn btn-light">❤️ Favorites</button>
      <button id="view-compare" class="btn btn-light">⚖️ Compare</button>
    </div>
  </div>

  <div id="featured-cars" class="card-grid"></div>
</section>
